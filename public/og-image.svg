<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f6fb"/>
      <stop offset="100%" stop-color="#ebedf6"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d4d82"/>
      <stop offset="100%" stop-color="#5B4E8B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#3d4d82" opacity="0.06"/>
  <circle cx="150" cy="530" r="160" fill="#5B4E8B" opacity="0.06"/>
  <!-- Logo badge -->
  <rect x="80" y="80" width="90" height="90" rx="20" fill="url(#badge)"/>
  <text x="125" y="142" font-family="Arial,sans-serif" font-weight="bold" font-size="42" fill="white" text-anchor="middle">SA</text>
  <!-- Name -->
  <text x="80" y="260" font-family="Arial,sans-serif" font-weight="bold" font-size="72" fill="#1a1a2e">Santiago Aragon</text>
  <!-- Title -->
  <text x="80" y="330" font-family="Arial,sans-serif" font-size="36" fill="#3d4d82" font-weight="600">Data Scientist &amp; Full-Stack Developer</text>
  <!-- Description -->
  <text x="80" y="400" font-family="Arial,sans-serif" font-size="28" fill="#6b7280">React · Next.js · Python · Machine Learning · SQL</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#badge)" opacity="0.9"/>
  <text x="600" y="612" font-family="Arial,sans-serif" font-size="22" fill="white" text-anchor="middle" opacity="0.9">Portfolio profesional · Disponible para proyectos</text>
</svg>
