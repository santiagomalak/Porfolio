<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8f0fe"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="48" fill="#1e293b" rx="12"/>
  <rect x="0" y="36" width="800" height="12" fill="#1e293b"/>
  <text x="24" y="30" font-family="monospace" font-size="13" fill="#94a3b8">Performance Monitoring System</text>
  <text x="680" y="30" font-family="monospace" font-size="11" fill="#64748b">● Live  ▲ 300+ users</text>

  <!-- Metric cards row -->
  <!-- Card 1: SUPERCOMPENSACIÓN -->
  <rect x="24" y="68" width="170" height="80" rx="8" fill="white" stroke="#d1fae5" stroke-width="1.5"/>
  <rect x="24" y="68" width="4" height="80" rx="2" fill="url(#green)"/>
  <text x="40" y="90" font-family="sans-serif" font-size="9" fill="#6b7280" font-weight="500">SUPERCOMPENSACIÓN</text>
  <text x="40" y="114" font-family="sans-serif" font-size="26" fill="#10b981" font-weight="700">142</text>
  <text x="40" y="136" font-family="sans-serif" font-size="9" fill="#10b981">↑ +12 esta semana</text>

  <!-- Card 2: ATENCIÓN -->
  <rect x="206" y="68" width="170" height="80" rx="8" fill="white" stroke="#fef3c7" stroke-width="1.5"/>
  <rect x="206" y="68" width="4" height="80" rx="2" fill="url(#amber)"/>
  <text x="222" y="90" font-family="sans-serif" font-size="9" fill="#6b7280" font-weight="500">ATENCIÓN</text>
  <text x="222" y="114" font-family="sans-serif" font-size="26" fill="#f59e0b" font-weight="700">87</text>
  <text x="222" y="136" font-family="sans-serif" font-size="9" fill="#f59e0b">→ estable</text>

  <!-- Card 3: FATIGADO -->
  <rect x="388" y="68" width="170" height="80" rx="8" fill="white" stroke="#fee2e2" stroke-width="1.5"/>
  <rect x="388" y="68" width="4" height="80" rx="2" fill="url(#red)"/>
  <text x="404" y="90" font-family="sans-serif" font-size="9" fill="#6b7280" font-weight="500">FATIGADO</text>
  <text x="404" y="114" font-family="sans-serif" font-size="26" fill="#ef4444" font-weight="700">23</text>
  <text x="404" y="136" font-family="sans-serif" font-size="9" fill="#ef4444">↓ -4 vs semana ant.</text>

