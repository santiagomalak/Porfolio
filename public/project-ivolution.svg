  <text x="700" y="236" font-family="sans-serif" font-size="8" fill="#10b981" font-weight="600">p75 ↑</text>

  <rect x="532" y="248" width="8" height="20" rx="2" fill="#f59e0b"/>
  <text x="546" y="262" font-family="sans-serif" font-size="9" fill="#374151">Atleta 003</text>
  <text x="700" y="262" font-family="sans-serif" font-size="8" fill="#f59e0b" font-weight="600">p25–p75</text>

  <rect x="532" y="274" width="8" height="20" rx="2" fill="#ef4444"/>
  <text x="546" y="288" font-family="sans-serif" font-size="9" fill="#374151">Atleta 004</text>
  <text x="700" y="288" font-family="sans-serif" font-size="8" fill="#ef4444" font-weight="600">p25 ↓</text>

  <rect x="532" y="300" width="8" height="20" rx="2" fill="#10b981"/>
  <text x="546" y="314" font-family="sans-serif" font-size="9" fill="#374151">Atleta 005</text>
  <text x="700" y="314" font-family="sans-serif" font-size="8" fill="#10b981" font-weight="600">p75 ↑</text>

  <rect x="532" y="326" width="8" height="20" rx="2" fill="#f59e0b"/>
  <text x="546" y="340" font-family="sans-serif" font-size="9" fill="#374151">Atleta 006</text>
  <text x="700" y="340" font-family="sans-serif" font-size="8" fill="#f59e0b" font-weight="600">p25–p75</text>

  <text x="532" y="358" font-family="sans-serif" font-size="8" fill="#9ca3af">+ 294 atletas más...</text>

