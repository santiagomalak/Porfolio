<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="0" y="0" width="3" height="450" fill="#6366f1"/>

  <!-- Watermarks -->
  <text x="60" y="160" font-family="monospace" font-size="110" fill="#6366f1" opacity="0.07" filter="url(#blur1)" font-weight="bold">WebSocket</text>
  <text x="100" y="300" font-family="monospace" font-size="90" fill="#6366f1" opacity="0.06" filter="url(#blur1)" font-weight="bold">Binance</text>
  <text x="40" y="420" font-family="monospace" font-size="70" fill="#6366f1" opacity="0.05" filter="url(#blur2)" font-weight="bold">Zustand</text>

  <!-- Fake candlestick chart -->
  <g opacity="0.25">
    <rect x="60" y="200" width="8" height="60" fill="#26a69a"/>
    <rect x="75" y="180" width="8" height="80" fill="#26a69a"/>
    <rect x="90" y="190" width="8" height="50" fill="#ef5350"/>
    <rect x="105" y="175" width="8" height="70" fill="#26a69a"/>
    <rect x="120" y="160" width="8" height="85" fill="#26a69a"/>
    <rect x="135" y="170" width="8" height="65" fill="#ef5350"/>
    <rect x="150" y="155" width="8" height="75" fill="#26a69a"/>
  </g>

  <!-- Content -->
  <text x="30" y="60" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1" letter-spacing="4" font-weight="600">REAL-TIME ANALYTICS</text>
  <text x="28" y="105" font-family="system-ui, sans-serif" font-size="36" fill="#ffffff" font-weight="700">Crypto Dashboard</text>
  <text x="30" y="135" font-family="system-ui, sans-serif" font-size="14" fill="#6b6b8a">BTC · ETH · SOL · BNB · XRP — Live Binance WebSocket</text>

  <text x="30" y="390" font-family="monospace" font-size="11" fill="#6366f1" opacity="0.6">wss://stream.binance.com · Anomaly Detection · z-score</text>

  <!-- Tags -->
  <rect x="28" y="330" width="100" height="22" rx="4" fill="#6366f130"/>
  <text x="78" y="345" font-family="system-ui" font-size="11" fill="#6366f1" text-anchor="middle">Next.js 14</text>

  <rect x="138" y="330" width="130" height="22" rx="4" fill="#6366f130"/>
  <text x="203" y="345" font-family="system-ui" font-size="11" fill="#6366f1" text-anchor="middle">lightweight-charts</text>

  <rect x="278" y="330" width="80" height="22" rx="4" fill="#6366f130"/>
  <text x="318" y="345" font-family="system-ui" font-size="11" fill="#6366f1" text-anchor="middle">Zustand</text>

  <rect x="368" y="330" width="100" height="22" rx="4" fill="#6366f130"/>
  <text x="418" y="345" font-family="system-ui" font-size="11" fill="#6366f1" text-anchor="middle">TypeScript</text>
</svg>
