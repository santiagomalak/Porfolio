<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="url(#bg_weather)"/>

  <!-- Grid -->
  <g opacity="0.07" stroke="#0d9488" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>

  <!-- Time series line (rainfall) -->
  <path d="M 460 350 L 490 300 L 520 320 L 550 250 L 580 280 L 610 200 L 640 240 L 670 180 L 700 220 L 730 160 L 760 190 L 790 140" stroke="#0d9488" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M 460 350 L 490 300 L 520 320 L 550 250 L 580 280 L 610 200 L 640 240 L 670 180 L 700 220 L 730 160 L 760 190 L 790 140 L 790 420 L 460 420 Z" fill="url(#teal_fade)" opacity="0.07"/>

  <!-- Missing data heatmap suggestion -->
  <g opacity="0.15">
    <rect x="560" y="60" width="15" height="15" rx="2" fill="#0d9488"/>
    <rect x="578" y="60" width="15" height="15" rx="2" fill="#333"/>
    <rect x="596" y="60" width="15" height="15" rx="2" fill="#0d9488"/>
    <rect x="614" y="60" width="15" height="15" rx="2" fill="#0d9488"/>
    <rect x="632" y="60" width="15" height="15" rx="2" fill="#333"/>
    <rect x="560" y="78" width="15" height="15" rx="2" fill="#333"/>
    <rect x="578" y="78" width="15" height="15" rx="2" fill="#0d9488"/>
    <rect x="596" y="78" width="15" height="15" rx="2" fill="#0d9488"/>
    <rect x="614" y="78" width="15" height="15" rx="2" fill="#333"/>
    <rect x="632" y="78" width="15" height="15" rx="2" fill="#0d9488"/>
    <rect x="560" y="96" width="15" height="15" rx="2" fill="#0d9488"/>
    <rect x="578" y="96" width="15" height="15" rx="2" fill="#0d9488"/>
    <rect x="596" y="96" width="15" height="15" rx="2" fill="#333"/>
    <rect x="614" y="96" width="15" height="15" rx="2" fill="#0d9488"/>
    <rect x="632" y="96" width="15" height="15" rx="2" fill="#0d9488"/>
    <text x="596" y="128" font-family="monospace" font-size="9" fill="#0d9488" opacity="0.5" text-anchor="middle">null map</text>
  </g>

  <!-- Distribution bars -->
  <g opacity="0.2">
    <rect x="680" y="200" width="16" height="200" rx="3" fill="#0d9488"/>
    <rect x="700" y="160" width="16" height="240" rx="3" fill="#0d9488"/>
    <rect x="720" y="130" width="16" height="270" rx="3" fill="#14b8a6"/>
    <rect x="740" y="170" width="16" height="230" rx="3" fill="#0d9488"/>
    <rect x="760" y="220" width="16" height="180" rx="3" fill="#0d9488"/>
    <rect x="780" y="260" width="16" height="140" rx="3" fill="#0d9488"/>
  </g>

  <!-- Main text -->
  <text x="60" y="120" font-family="monospace" font-size="11" fill="#0d9488" opacity="0.9" letter-spacing="3">PIPELINE · IMPUTATION · FEATURE ENGINEERING</text>

  <text x="60" y="200" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#ffffff">Weather AUS</text>
  <text x="60" y="255" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#0d9488">Pipeline</text>

  <text x="60" y="310" font-family="Arial, sans-serif" font-size="16" fill="#888">Kaggle · Imputación · Encoding · StandardScaler</text>

  <!-- Pills -->
  <rect x="60" y="340" width="80" height="26" rx="13" fill="#0d9488" opacity="0.9"/>
  <text x="100" y="357" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Pipeline</text>

  <rect x="152" y="340" width="100" height="26" rx="13" fill="#0a1a18" opacity="0.9"/>
  <text x="202" y="357" font-family="Arial, sans-serif" font-size="11" fill="#888" text-anchor="middle">Imputation</text>

  <rect x="264" y="340" width="80" height="26" rx="13" fill="#0a1a18" opacity="0.9"/>
  <text x="304" y="357" font-family="Arial, sans-serif" font-size="11" fill="#888" text-anchor="middle">Encoding</text>

  <defs>
    <linearGradient id="bg_weather" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020f0e"/>
      <stop offset="100%" stop-color="#050d0d"/>
    </linearGradient>
    <linearGradient id="teal_fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
