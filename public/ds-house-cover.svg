<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="url(#bg_house)"/>

  <!-- Grid -->
  <g opacity="0.07" stroke="#1a4a8a" stroke-width="1">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Scatter plot decoration -->
  <g opacity="0.25">
    <circle cx="500" cy="350" r="5" fill="#3a7bd5"/>
    <circle cx="530" cy="310" r="4" fill="#3a7bd5"/>
    <circle cx="560" cy="280" r="6" fill="#1a4a8a"/>
    <circle cx="590" cy="250" r="4" fill="#3a7bd5"/>
    <circle cx="620" cy="220" r="5" fill="#3a7bd5"/>
    <circle cx="650" cy="195" r="7" fill="#1a4a8a"/>
    <circle cx="680" cy="170" r="4" fill="#3a7bd5"/>
    <circle cx="710" cy="150" r="5" fill="#3a7bd5"/>
    <circle cx="740" cy="130" r="6" fill="#1a4a8a"/>
    <circle cx="770" cy="110" r="4" fill="#3a7bd5"/>
    <circle cx="515" cy="330" r="3" fill="#5a9bd5"/>
    <circle cx="545" cy="295" r="3" fill="#5a9bd5"/>
    <circle cx="575" cy="265" r="4" fill="#5a9bd5"/>
    <circle cx="605" cy="235" r="3" fill="#5a9bd5"/>
    <circle cx="635" cy="208" r="5" fill="#5a9bd5"/>
    <circle cx="665" cy="180" r="3" fill="#5a9bd5"/>
    <circle cx="695" cy="158" r="4" fill="#5a9bd5"/>
  </g>

  <!-- Regression line -->
  <line x1="490" y1="370" x2="780" y2="95" stroke="#3a7bd5" stroke-width="2" opacity="0.6" stroke-dasharray="8 4"/>

  <!-- Bar chart (price distribution) -->
  <g opacity="0.18">
    <rect x="480" y="260" width="18" height="120" rx="2" fill="#1a4a8a"/>
    <rect x="502" y="220" width="18" height="160" rx="2" fill="#1a4a8a"/>
    <rect x="524" y="190" width="18" height="190" rx="2" fill="#3a7bd5"/>
    <rect x="546" y="175" width="18" height="205" rx="2" fill="#3a7bd5"/>
    <rect x="568" y="200" width="18" height="180" rx="2" fill="#1a4a8a"/>
    <rect x="590" y="230" width="18" height="150" rx="2" fill="#1a4a8a"/>
    <rect x="612" y="270" width="18" height="110" rx="2" fill="#1a4a8a"/>
  </g>

  <!-- Label: accuracy -->
  <rect x="640" y="30" width="130" height="50" rx="8" fill="#1a4a8a" opacity="0.9"/>
  <text x="705" y="51" font-family="Arial, sans-serif" font-size="11" fill="#aaccff" text-anchor="middle" opacity="0.9">Accuracy</text>
  <text x="705" y="71" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">84%</text>

  <!-- Main text -->
  <text x="60" y="120" font-family="monospace" font-size="11" fill="#3a7bd5" opacity="0.9" letter-spacing="3">REGRESSION · CLASSIFICATION · RANDOM FOREST</text>

  <text x="60" y="200" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#ffffff">House Price</text>
  <text x="60" y="255" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#3a7bd5">Prediction</text>

  <text x="60" y="310" font-family="Arial, sans-serif" font-size="16" fill="#aaaaaa">80+ features · RandomForest · Pipeline · Kaggle</text>

  <!-- Pill badges -->
  <rect x="60" y="340" width="100" height="26" rx="13" fill="#1a4a8a" opacity="0.9"/>
  <text x="110" y="357" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Regresión</text>

  <rect x="172" y="340" width="110" height="26" rx="13" fill="#222" opacity="0.9"/>
  <text x="227" y="357" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Clasificación</text>

  <rect x="294" y="340" width="80" height="26" rx="13" fill="#222" opacity="0.9"/>
  <text x="334" y="357" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Kaggle</text>

  <defs>
    <linearGradient id="bg_house" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050d1a"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
  </defs>
</svg>
