<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="url(#bg_ibm)"/>

  <!-- Grid -->
  <g opacity="0.06" stroke="#0062ff" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="133" y1="0" x2="133" y2="450"/>
    <line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="666" y1="0" x2="666" y2="450"/>
  </g>

  <!-- Confusion matrix decoration -->
  <g opacity="0.2">
    <rect x="560" y="80" width="80" height="80" rx="4" fill="#0062ff"/>
    <rect x="648" y="80" width="80" height="80" rx="4" fill="#001a44"/>
    <rect x="560" y="168" width="80" height="80" rx="4" fill="#001a44"/>
    <rect x="648" y="168" width="80" height="80" rx="4" fill="#0062ff"/>
    <text x="600" y="128" font-family="Arial" font-size="22" fill="white" text-anchor="middle" opacity="0.7">TP</text>
    <text x="688" y="128" font-family="Arial" font-size="22" fill="#333" text-anchor="middle" opacity="0.5">FP</text>
    <text x="600" y="216" font-family="Arial" font-size="22" fill="#333" text-anchor="middle" opacity="0.5">FN</text>
    <text x="688" y="216" font-family="Arial" font-size="22" fill="white" text-anchor="middle" opacity="0.7">TN</text>
  </g>

  <!-- Feature importance bars -->
  <g opacity="0.2">
    <rect x="480" y="300" width="120" height="14" rx="3" fill="#0062ff"/>
    <rect x="480" y="320" width="90" height="14" rx="3" fill="#0062ff"/>
    <rect x="480" y="340" width="70" height="14" rx="3" fill="#0062ff"/>
    <rect x="480" y="360" width="55" height="14" rx="3" fill="#0062ff"/>
    <rect x="480" y="380" width="40" height="14" rx="3" fill="#0062ff"/>
  </g>

  <!-- PCA cluster circles -->
  <g opacity="0.12">
    <circle cx="740" cy="340" r="45" fill="#0062ff"/>
    <circle cx="710" cy="380" r="30" fill="#4d94ff"/>
    <circle cx="770" cy="375" r="25" fill="#0062ff"/>
  </g>

  <!-- Accuracy badge -->
  <rect x="640" y="30" width="130" height="50" rx="8" fill="#0062ff" opacity="0.9"/>
  <text x="705" y="51" font-family="Arial, sans-serif" font-size="11" fill="#aaccff" text-anchor="middle">Attrition Rate</text>
  <text x="705" y="71" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">1.470 emp.</text>

  <!-- Main text -->
  <text x="60" y="120" font-family="monospace" font-size="11" fill="#0062ff" opacity="0.9" letter-spacing="3">RANDOM FOREST · K-MEANS · PCA · HR ANALYTICS</text>

  <text x="60" y="200" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#ffffff">IBM HR</text>
  <text x="60" y="255" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#0062ff">Attrition</text>

  <text x="60" y="310" font-family="Arial, sans-serif" font-size="16" fill="#888">1.470 empleados · Random Forest · K-Means · PCA</text>

  <!-- Pills -->
  <rect x="60" y="340" width="120" height="26" rx="13" fill="#0062ff" opacity="0.9"/>
  <text x="120" y="357" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Random Forest</text>

  <rect x="192" y="340" width="80" height="26" rx="13" fill="#111" opacity="0.9"/>
  <text x="232" y="357" font-family="Arial, sans-serif" font-size="11" fill="#777" text-anchor="middle">K-Means</text>

  <rect x="284" y="340" width="60" height="26" rx="13" fill="#111" opacity="0.9"/>
  <text x="314" y="357" font-family="Arial, sans-serif" font-size="11" fill="#777" text-anchor="middle">PCA</text>

  <defs>
    <linearGradient id="bg_ibm" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000d1a"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
  </defs>
</svg>
