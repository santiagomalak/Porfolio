<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur-lg"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="blur-md"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="800" height="450" fill="#121212"/>

  <!-- Library watermarks -->
  <g filter="url(#blur-lg)" opacity="0.16">
    <text x="420" y="210" font-family="monospace" font-size="120" fill="#1DB954" text-anchor="middle">seaborn</text>
  </g>
  <g filter="url(#blur-md)" opacity="0.13">
    <text x="660" y="340" font-family="monospace" font-size="85" fill="#1DB954" text-anchor="middle">pandas</text>
  </g>
  <g filter="url(#blur-md)" opacity="0.10">
    <text x="140" y="390" font-family="monospace" font-size="70" fill="#1ed760" text-anchor="middle">numpy</text>
  </g>
  <g filter="url(#blur-sm)" opacity="0.11">
    <text x="630" y="115" font-family="monospace" font-size="50" fill="#1DB954" text-anchor="middle">matplotlib</text>
  </g>

  <!-- Grid -->
  <g opacity="0.05" stroke="#1DB954" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
  </g>

  <!-- Accent line -->
  <rect x="60" y="100" width="3" height="160" rx="2" fill="#1DB954" opacity="0.9"/>

  <!-- Main content -->
  <text x="80" y="135" font-family="monospace" font-size="11" fill="#1DB954" opacity="0.7" letter-spacing="3">EDA · CORRELATION · TREND ANALYSIS · 1998–2020</text>
  <text x="80" y="200" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#ffffff">Spotify Music</text>
  <text x="80" y="258" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#1DB954">Analysis</text>
  <text x="80" y="295" font-family="Arial, sans-serif" font-size="14" fill="#888">2.000 canciones · 59 géneros · audio features · EDA</text>
</svg>
