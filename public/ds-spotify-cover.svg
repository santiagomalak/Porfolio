  <!-- Line chart: popularity trend -->
  <path d="M 60 350 L 120 320 L 180 300 L 240 280 L 300 260 L 360 230 L 420 200 L 450 185" stroke="#1DB954" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M 60 350 L 120 320 L 180 300 L 240 280 L 300 260 L 360 230 L 420 200 L 450 185 L 450 390 L 60 390 Z" fill="url(#green_fade)" opacity="0.08"/>

  <!-- Correlation dots -->
  <g opacity="0.2">
