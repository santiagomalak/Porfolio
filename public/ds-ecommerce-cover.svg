<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f00"/>
      <stop offset="100%" stop-color="#080d08"/>
    </linearGradient>
    <filter id="blur-lg"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="blur-md"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Library watermarks -->
  <g filter="url(#blur-lg)" opacity="0.18">
    <text x="420" y="210" font-family="monospace" font-size="120" fill="#FF694B" text-anchor="middle">dbt</text>
  </g>
  <g filter="url(#blur-md)" opacity="0.13">
    <text x="660" y="340" font-family="monospace" font-size="80" fill="#316192" text-anchor="middle">postgres</text>
  </g>
  <g filter="url(#blur-md)" opacity="0.10">
    <text x="140" y="390" font-family="monospace" font-size="70" fill="#FF694B" text-anchor="middle">SQL</text>
  </g>
  <g filter="url(#blur-sm)" opacity="0.12">
    <text x="630" y="115" font-family="monospace" font-size="52" fill="#4285F4" text-anchor="middle">Docker</text>
  </g>

  <!-- Grid -->
  <g opacity="0.05" stroke="#FF694B" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
  </g>

  <!-- Accent line -->
  <rect x="60" y="100" width="3" height="160" rx="2" fill="#FF694B" opacity="0.9"/>

  <!-- Main content -->
  <text x="80" y="135" font-family="monospace" font-size="11" fill="#FF694B" opacity="0.7" letter-spacing="3">PostgreSQL · dbt · PYTHON · DOCKER · CI/CD</text>
  <text x="80" y="200" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#ffffff">E-Commerce</text>
  <text x="80" y="258" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#FF694B">Data Platform</text>
  <text x="80" y="295" font-family="Arial, sans-serif" font-size="14" fill="#888">Olist · RFM · Cohorts · dbt · PostgreSQL · GitHub Actions</text>
</svg>
