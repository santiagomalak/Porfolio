<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0d0808"/>
    </linearGradient>
    <filter id="blur-lg"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="blur-md"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Library watermarks — blurred background -->
  <g filter="url(#blur-lg)" opacity="0.18">
    <text x="400" y="200" font-family="monospace" font-size="130" fill="#c41200" text-anchor="middle">NLTK</text>
  </g>
  <g filter="url(#blur-md)" opacity="0.13">
    <text x="680" y="320" font-family="monospace" font-size="80" fill="#ff4422" text-anchor="middle">sklearn</text>
  </g>
  <g filter="url(#blur-md)" opacity="0.10">
    <text x="150" y="380" font-family="monospace" font-size="70" fill="#c41200" text-anchor="middle">pandas</text>
  </g>
  <g filter="url(#blur-sm)" opacity="0.12">
    <text x="620" y="110" font-family="monospace" font-size="55" fill="#ff6644" text-anchor="middle">TextBlob</text>
  </g>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#c41200" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
  </g>

  <!-- Accent line -->
  <rect x="60" y="100" width="3" height="160" rx="2" fill="#c41200" opacity="0.8"/>

  <!-- Main content -->
  <text x="80" y="135" font-family="monospace" font-size="11" fill="#c41200" opacity="0.7" letter-spacing="3">NLP · SENTIMENT · TOPIC MODELING</text>
  <text x="80" y="200" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#ffffff">Yelp Reviews</text>
  <text x="80" y="258" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#c41200">NLP Pipeline</text>
  <text x="80" y="295" font-family="Arial, sans-serif" font-size="14" fill="#888">27.290 reseñas · TextBlob · LDA · K-Means · TF-IDF</text>
</svg>
