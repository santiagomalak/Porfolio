<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#1a0a00"/>
  <rect width="800" height="450" fill="url(#bg_nlp)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#c41200" stroke-width="1">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Sentiment bar chart (background decoration) -->
  <g opacity="0.15">
    <rect x="480" y="280" width="30" height="100" rx="4" fill="#c41200"/>
    <rect x="520" y="240" width="30" height="140" rx="4" fill="#c41200"/>
    <rect x="560" y="200" width="30" height="180" rx="4" fill="#c41200"/>
    <rect x="600" y="170" width="30" height="210" rx="4" fill="#ff4422"/>
    <rect x="640" y="210" width="30" height="170" rx="4" fill="#c41200"/>
    <rect x="680" y="250" width="30" height="130" rx="4" fill="#c41200"/>
    <rect x="720" y="300" width="30" height="80" rx="4" fill="#c41200"/>
    <rect x="760" y="320" width="30" height="60" rx="4" fill="#c41200"/>
  </g>

  <!-- Word cloud dots (decorative) -->
  <g opacity="0.2">
    <circle cx="550" cy="80" r="3" fill="#ff6644"/>
    <circle cx="600" cy="60" r="5" fill="#c41200"/>
    <circle cx="650" cy="90" r="4" fill="#ff4422"/>
    <circle cx="700" cy="55" r="6" fill="#c41200"/>
    <circle cx="580" cy="110" r="3" fill="#ff6644"/>
    <circle cx="740" cy="100" r="4" fill="#c41200"/>
    <circle cx="620" cy="130" r="5" fill="#ff4422"/>
    <circle cx="760" cy="75" r="3" fill="#c41200"/>
  </g>

  <!-- Sentiment curve -->
  <path d="M 60 320 Q 150 200 240 260 Q 330 320 420 180 Q 510 80 580 140 Q 650 200 720 160" stroke="#c41200" stroke-width="2.5" fill="none" opacity="0.5" stroke-dasharray="6 4"/>

  <!-- Star rating dots -->
  <g opacity="0.35">
    <circle cx="60" cy="380" r="4" fill="#ff8855"/>
    <circle cx="80" cy="380" r="4" fill="#ff8855"/>
    <circle cx="100" cy="380" r="4" fill="#ff8855"/>
    <circle cx="120" cy="380" r="4" fill="#ff8855"/>
    <circle cx="140" cy="380" r="2" fill="#555"/>
  </g>
  <g opacity="0.25">
    <circle cx="60" cy="400" r="4" fill="#ff8855"/>
    <circle cx="80" cy="400" r="4" fill="#ff8855"/>
    <circle cx="100" cy="400" r="4" fill="#ff8855"/>
    <circle cx="120" cy="400" r="2" fill="#555"/>
    <circle cx="140" cy="400" r="2" fill="#555"/>
  </g>

  <!-- Main content -->
  <text x="60" y="120" font-family="monospace" font-size="11" fill="#c41200" opacity="0.8" letter-spacing="3">NLP · SENTIMENT ANALYSIS · TOPIC MODELING</text>

  <text x="60" y="200" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#ffffff">Yelp Reviews</text>
  <text x="60" y="255" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#c41200">NLP Pipeline</text>

  <text x="60" y="310" font-family="Arial, sans-serif" font-size="16" fill="#aaaaaa">27.290 reseñas · TextBlob · LDA · K-Means · TF-IDF</text>

  <!-- Pill badges -->
  <rect x="60" y="340" width="100" height="26" rx="13" fill="#c41200" opacity="0.9"/>
  <text x="110" y="357" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Sentiment</text>

  <rect x="172" y="340" width="90" height="26" rx="13" fill="#333" opacity="0.9"/>
  <text x="217" y="357" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">LDA Topics</text>

  <rect x="274" y="340" width="90" height="26" rx="13" fill="#333" opacity="0.9"/>
  <text x="319" y="357" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Clustering</text>

  <defs>
    <linearGradient id="bg_nlp" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>
</svg>
